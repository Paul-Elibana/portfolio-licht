<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2ff"/>
      <stop offset="100%" stop-color="#bc13fe"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#00f2ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00f2ff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circle">
      <circle cx="160" cy="160" r="160"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="160" cy="160" r="160" fill="url(#bg)"/>
  <circle cx="160" cy="130" r="120" fill="url(#glow)"/>

  <!-- Body silhouette -->
  <ellipse cx="160" cy="310" rx="90" ry="55" fill="#0f2744" clip-path="url(#circle)"/>
  <ellipse cx="160" cy="295" rx="72" ry="48" fill="#0e2240" clip-path="url(#circle)"/>

  <!-- Head -->
  <circle cx="160" cy="128" r="52" fill="#1e3a5f"/>
  <circle cx="160" cy="128" r="44" fill="#172d4a"/>

  <!-- Face glow -->
  <circle cx="160" cy="120" r="30" fill="#1a3357" opacity="0.9"/>

  <!-- Initials -->
  <text x="160" y="137" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="36" font-weight="700" letter-spacing="-1" fill="url(#accent)">PE</text>

  <!-- Subtle border ring -->
  <circle cx="160" cy="160" r="158" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.25"/>
</svg>
